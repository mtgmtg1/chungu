# [Flow: Step 1 (Docling 전처리 서비스 기동 on a1) -> Step 2 (CPU 리소스 설정) -> Step 3 (모델 캐시 볼륨 마운트)]
# a1 CPU 서버에서 Docling 전처리 서비스를 구동하는 compose 파일.
services:
  docling:
    build:
      context: .
      dockerfile: backend/docling_service/Dockerfile
    env_file: .env
    ports:
      - "${DOCLING_SERVICE_PORT:-28182}:28182"
    volumes:
      - docling_models:/app/models
      - docling_data:/data
    restart: unless-stopped

volumes:
  docling_models:
  docling_data:
