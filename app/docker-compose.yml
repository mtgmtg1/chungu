# [Flow: Step 1 (redis 기동) -> Step 2 (api: FastAPI + Supabase 연동) -> Step 3 (worker: Celery + Storage) -> Step 4 (volume에 임시 작업 저장)]
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 28181
    env_file: .env
    ports:
      - "${APP_PORT:-28181}:28181"
    volumes:
      - appdata:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - supabase-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    command: celery -A backend.celery_app.celery worker --loglevel=info --concurrency=16
    env_file: .env
    environment:
      - DOCLING_SERVICE_URL=http://docling:28182
      - PADDLEOCR_SERVICE_URL=http://paddleocr_service:8080
    volumes:
      - appdata:/data
    depends_on:
      redis:
        condition: service_healthy
      docling:
        condition: service_started
      paddleocr_service:
        condition: service_started
    networks:
      - default
      - supabase-network
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    command: celery -A backend.celery_app.celery beat --loglevel=info
    env_file: .env
    environment:
      - DOCLING_SERVICE_URL=http://docling:28182
      - PADDLEOCR_SERVICE_URL=http://paddleocr_service:8080
    volumes:
      - appdata:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - supabase-network
    restart: unless-stopped

  docling:
    build:
      context: .
      dockerfile: backend/docling_service/Dockerfile
    env_file: .env
    ports:
      - "${DOCLING_SERVICE_PORT:-28182}:28182"
    volumes:
      - appdata:/data
      - docling_models:/app/models
    networks:
      - default
    restart: unless-stopped

  paddleocr_service:
    build:
      context: .
      dockerfile: backend/paddleocr_service/Dockerfile
    env_file: .env
    environment:
      - PADDLEOCR_API_TOKEN=${PADDLEOCR_API_TOKEN:-}
      - PADDLEOCR_API_URL=${PADDLEOCR_API_URL:-https://paddleocr.aistudio-app.com/api/v2/ocr/jobs}
    volumes:
      - appdata:/data
    networks:
      - default
    restart: unless-stopped

volumes:
  appdata:
  docling_models:

networks:
  supabase-network:
    external: true
    name: supabase-network
